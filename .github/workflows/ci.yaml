name: Data Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest        # no GPU needed for logic tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install CI dependencies
        run: |
          pip install --upgrade pip
          # Install only what tests need (no torch/CUDA in CI)
          pip install pytest pytest-cov flake8 PyYAML

      - name: Lint with flake8
        run: |
          # Fail on real errors, warn on style
          flake8 src/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=__pycache__

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  validate-config-template:
    name: Validate config template
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check config template is valid YAML
        run: |
          pip install PyYAML
          python3 -c "
          import yaml
          with open('configs/config.template.yaml') as f:
              config = yaml.safe_load(f)
          required = ['mode','gcp_cloud_path','camera_ids','target_dates',
                      'output_choice','fps_rate','local_dataset_dir',
                      'detection_strategy','yolo_confidence']
          missing = [k for k in required if k not in config]
          if missing:
              raise SystemExit(f'Config template missing keys: {missing}')
          print('Config template valid:', list(config.keys()))
          "

  docker-build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: lint-and-test        # only build if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no push)
        run: |
          docker build \
            --tag cv-data-pipeline:ci-test \
            --file Dockerfile \
            .
          echo "Docker build succeeded"
